<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Search Metro Journeys</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

  <header class="hero">
    <div class="hero-content">
      <h1>Search Metro</h1>
      <p>Find your journey easily</p>
    </div>
  </header>

  <main class="container">
    <section class="search-card">
      <h2>Journey Search</h2>

      <div class="form-row">
        <input type="text" id="origin" placeholder="From (e.g. Pune)">
        <input type="text" id="destination" placeholder="To (e.g. Mumbai)">
        <button onclick="searchJourney()">Search</button>
      </div>

      <div id="results"></div>
    </section>
  </main>

  <script src="/js/app.js"></script>
</body>
</html>
