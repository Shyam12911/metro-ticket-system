<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pune Metro Ticket Booking</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<header class="top-bar">
    <div class="logo-box">
        <img src="/images/pune-metro-logo.png" alt="Pune Metro Logo">
        <div class="metro-logo">
            <div class="title">PUNE METRO</div>
            <div class="subtitle">Maha Metro</div>
        </div>
    </div>

    <button id="darkToggle" class="dark-toggle">🌙</button>
</header>

<main class="container">

    <!-- BOOKING -->
    <section class="card">
        <h2>Book Metro Ticket</h2>

        <label>From Station</label>
        <select id="fromStation"></select>

        <button type="button" class="swap-btn" onclick="swapStations()">⇅</button>

        <label>To Station</label>
        <select id="toStation"></select>

       <button id="bookBtn" class="primary-btn" disabled>
    BOOK TICKET
</button>
    </section>

    <!-- LOADER -->
    <section id="loader" class="card skeleton hidden">
        <div class="line"></div>
        <div class="line"></div>
        <div class="line short"></div>
    </section>

    <!-- TICKET -->
    <section id="ticketSection" class="card hidden slide-in">
        <h2>Your Ticket</h2>

        <!-- IMPORTANT: keep empty, JS will inject structured HTML -->
        <div id="ticketBox"></div>

        <div class="actions">
            <button class="secondary-btn" onclick="openPrint()">Print Ticket</button>
            <button class="secondary-btn" onclick="openQR()">View QR</button>
        </div>
    </section>

</main>

<footer>
    © Maha Metro – Pune Metro Rail Corporation
</footer>

<script src="/app.js"></script>
</body>
</html>
