<!DOCTYPE html>
<html>
<head>
  <title>Pune Metro</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/theme.css">
</head>
<body>

<header class="header">
  <a href="index.html">
    <img src="assets/images/logo.svg" alt="Pune Metro" height="28">
  </a>
</header>

<div class="container">
  <div class="card">

    <!-- Decorative metro image -->
    <img
      src="assets/images/metro-train.svg"
      alt="Metro Train"
      style="width:160px;margin:0 auto 16px;display:block;"
    >

    <h3>Welcome to Pune Metro</h3>

    <!-- QR placeholder (example for ticket/scan section) -->
    <img
      src="assets/images/qr-placeholder.svg"
      alt="QR Code"
      width="160"
      style="margin:16px auto;display:block;"
    >

  </div>
</div>

</body>
</html>
