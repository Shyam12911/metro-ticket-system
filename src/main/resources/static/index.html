<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Metro Tickets</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <header class="hero">
    <div class="hero-content">
      <h1>Metro Ticket Booking</h1>
      <p>Fast tickets. Real routes. Colorful UI.</p>
    </div>
  </header>

  <main class="container">
    <section class="search-card">
      <h2>Search Trains</h2>
      <div class="form-row">
        <input id="origin" placeholder="Origin (e.g., Pune)" />
        <input id="destination" placeholder="Destination (e.g., Mumbai)" />
        <button id="searchBtn">Search</button>
      </div>
      <div id="results"></div>
    </section>
  </main>

  <script src="/js/app.js"></script>
</body>
</html>
