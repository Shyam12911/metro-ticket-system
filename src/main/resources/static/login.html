<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pune Metro – Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<header class="top-bar">
    <div class="logo-box">
        <img src="/images/pune-metro-logo.png">
        <div class="metro-logo">
            <div class="title">PUNE METRO</div>
            <div class="subtitle">Welcome</div>
        </div>
    </div>
</header>

<main class="container">
    <section class="card" id="loginCard">
        <h2>Verify Mobile Number</h2>

        <label>Mobile Number</label>
        <input id="mobile" placeholder="10-digit mobile" />

        <button class="primary-btn" onclick="sendOtp()">Send OTP</button>

        <div id="otpBox" class="hidden">
            <label>Enter OTP</label>
            <input id="otp" placeholder="OTP" />
            <button class="primary-btn" onclick="verifyOtp()">Verify OTP</button>
        </div>
    </section>
</main>

<script src="/login.js"></script>
</body>
</html>
